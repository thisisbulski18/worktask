<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis | Gucci Burgundy Edition</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Warna Burgundy Sesuai Gambar Sebelumnya */
            --burgundy-dark: #2d050a;
            --burgundy-main: #4d0711;
            --white-pure: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            /* Latar belakang merah burgundy mewah */
            background: radial-gradient(circle at center, var(--burgundy-main) 0%, var(--burgundy-dark) 100%);
            font-family: 'Inter', sans-serif;
            color: var(--white-pure);
            overflow: hidden;
        }

        /* Tekstur halus agar background terlihat mahal */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
            opacity: 0.1;
            z-index: -1;
        }

        .main-wrapper {
            text-align: center;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            animation: fadeIn 1.5s ease-out;
        }

        /* TULISAN GUCCI (Gaya Digital Globe: Putih, Lebar, Serif) */
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(55px, 12vw, 115px);
            font-weight: 600;
            letter-spacing: 25px; /* Jarak huruf lebar agar sangat elegan */
            margin-bottom: 50px;
            text-transform: uppercase;
            color: #ffffff;
            /* Memberikan sedikit efek cahaya agar tulisan "hidup" */
            text-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(255,255,255,0.1);
            margin-left: 25px; /* Menyeimbangkan spasi huruf terakhir agar tetap di tengah */
        }

        .time-box-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 60px;
        }

        /* Kotak Transparan Halus */
        .time-box {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 50px;
            border-radius: 4px;
            min-width: 180px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .label {
            display: block;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 4px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }

        .time-value {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            display: block;
            letter-spacing: 1px;
        }

        /* Teks Deskripsi */
        .footer-text {
            font-size: 13px;
            font-weight: 700;
            line-height: 2;
            letter-spacing: 2px;
            text-transform: uppercase;
            max-width: 600px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.6);
        }

        .divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 30px auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsif HP */
        @media (max-width: 600px) {
            .logo-text { font-size: 45px; letter-spacing: 12px; margin-left: 12px; }
            .time-box-container { flex-direction: column; align-items: center; gap: 20px; }
            .time-box { width: 85%; padding: 25px; }
            .time-value { font-size: 40px; }
            .footer-text { font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- Tulisan GUCCI Serif Putih Lebar -->
        <h1 class="logo-text">GUCCI</h1>

        <div class="time-box-container">
            <div class="time-box">
                <span class="label">Mulai</span>
                <span class="time-value" id="startTime">--:--</span>
            </div>
            <div class="time-box">
                <span class="label">Selesai</span>
                <span class="time-value" id="endTime">--:--</span>
            </div>
        </div>

        <div class="divider"></div>

        <p class="footer-text">
            Sistem sedang memproses profit di dalam akun anda<br>
            mohon menunggu hingga waktu yang<br>
            ditentukan sistem berakhir
        </p>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const pad = (num) => num.toString().padStart(2, '0');
            
            // Jam Dunia Real-time
            document.getElementById('startTime').innerText = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
            
            // Waktu Selesai (Otomatis +5 Menit)
            const future = new Date(now.getTime() + 5 * 60000);
            document.getElementById('endTime').innerText = `${pad(future.getHours())}:${pad(future.getMinutes())}`;
        }
        
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
