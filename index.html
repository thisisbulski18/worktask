<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis | Live Sync</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Latar belakang globe */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: brightness(0.25) contrast(1.2);
            z-index: -1;
        }

        .glow-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 50, 100, 0.3) 0%, transparent 70%);
            z-index: -1;
        }

        .main-wrapper {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(50px, 10vw, 110px); /* Ukuran dinamis */
            font-weight: 700;
            letter-spacing: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .time-box-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 20px 45px;
            border-radius: 12px;
            min-width: 160px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .label {
            display: block;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
        }

        .time-value {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            display: block;
            color: #fff;
        }

        .footer-text {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.6;
            letter-spacing: 1px;
            text-transform: uppercase;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
        }

        /* Responsif untuk layar kecil/HP */
        @media (max-width: 600px) {
            .time-box-container { gap: 10px; }
            .time-box { padding: 15px 25px; min-width: 130px; }
            .time-value { font-size: 32px; }
            .label { font-size: 16px; }
            .footer-text { font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="glow-overlay"></div>

    <div class="main-wrapper">
        <h1 class="logo">GUCCI</h1>

        <div class="time-box-container">
            <div class="time-box">
                <span class="label">MULAI</span>
                <span class="time-value" id="startTime">--:--</span>
            </div>
            <div class="time-box">
                <span class="label">SELESAI</span>
                <span class="time-value" id="endTime">--:--</span>
            </div>
        </div>

        <p class="footer-text">
            SISTEM SEDANG MEMPROSES PROFIT DI DALAM AKUN ANDA<br>
            MOHON MENUNGGU HINGGA WAKTU YANG <br>
            DITENTUKAN SISTEM BERAKHIR
        </p>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // Fungsi untuk menambah angka 0 di depan jika di bawah 10
            const pad = (num) => num.toString().padStart(2, '0');

            // 1. Waktu MULAI (Jam Dunia Sekarang)
            const hours = pad(now.getHours());
            const minutes = pad(now.getMinutes());
            document.getElementById('startTime').innerText = `${hours}:${minutes}`;

            // 2. Waktu SELESAI (Misalnya 5 menit setelah MULAI)
            const futureDate = new Date(now.getTime() + 5 * 60000); // Tambah 5 menit
            const endHours = pad(futureDate.getHours());
            const endMinutes = pad(futureDate.getMinutes());
            document.getElementById('endTime').innerText = `${endHours}:${endMinutes}`;
        }

        // Jalankan setiap 1 detik agar waktu selalu sinkron
        setInterval(updateClock, 1000);

        // Jalankan langsung saat halaman dibuka
        updateClock();
    </script>
</body>
</html>
