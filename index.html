<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis | Luxury Edition</title>
    <!-- Google Fonts untuk kesan High Fashion -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Warna Burgundy Berdasarkan Gambar Anda */
            --burgundy-dark: #2d050a;
            --burgundy-main: #4d0711;
            --white-pure: #ffffff;
            --glass-white: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Latar belakang gradasi burgundy mewah */
            background: radial-gradient(circle at center, var(--burgundy-main) 0%, var(--burgundy-dark) 100%);
            font-family: 'Inter', sans-serif;
            color: var(--white-pure);
            overflow: hidden;
        }

        /* Tekstur halus di background agar tidak flat */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
            opacity: 0.1;
            z-index: -1;
        }

        .main-wrapper {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            animation: fadeIn 1.5s ease-out;
        }

        /* LOGO GUCCI - Menggunakan gambar yang Anda berikan */
        .logo-container {
            margin-bottom: 60px;
        }

        .logo-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            /* Efek bayangan halus agar terlihat premium */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .time-box-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 60px;
        }

        /* KOTAK TRANSPARAN MEWAH */
        .time-box {
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 50px;
            border-radius: 4px; /* Sudut sedikit tegas untuk kesan elegan */
            min-width: 180px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .label {
            display: block;
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 6px; /* Spasi lebar khas brand mewah */
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }

        .time-value {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            display: block;
            letter-spacing: 2px;
        }

        /* TEKS DESKRIPSI */
        .footer-text {
            font-size: 12px;
            font-weight: 300;
            line-height: 2.2;
            letter-spacing: 3px;
            text-transform: uppercase;
            max-width: 600px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0.8;
        }

        /* Dekorasi Garis Halus */
        .divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
            margin: 30px auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Optimasi Mobile */
        @media (max-width: 600px) {
            .logo-img { max-width: 280px; }
            .time-box-container { flex-direction: column; align-items: center; gap: 20px; }
            .time-box { width: 80%; padding: 25px; }
            .time-value { font-size: 38px; }
            .footer-text { font-size: 10px; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- Logo Gucci Sesuai Gambar -->
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Gucci-Logo.svg/1280px-Gucci-Logo.svg.png" 
                 alt="Gucci Logo" class="logo-img">
        </div>

        <div class="time-box-container">
            <div class="time-box">
                <span class="label">Mulai</span>
                <span class="time-value" id="startTime">--:--</span>
            </div>
            <div class="time-box">
                <span class="label">Selesai</span>
                <span class="time-value" id="endTime">--:--</span>
            </div>
        </div>

        <div class="divider"></div>

        <p class="footer-text">
            Sistem sedang memproses profit di dalam akun anda<br>
            mohon menunggu hingga waktu yang<br>
            ditentukan sistem berakhir
        </p>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const pad = (num) => num.toString().padStart(2, '0');

            // Waktu Live Sekarang
            document.getElementById('startTime').innerText = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

            // Waktu Estimasi (+5 Menit)
            const future = new Date(now.getTime() + 5 * 60000);
            document.getElementById('endTime').innerText = `${pad(future.getHours())}:${pad(future.getMinutes())}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
