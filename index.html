<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis | Premium Edition</title>
    <!-- Import Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-color: #00d4ff; /* Warna biru cyan tech */
            --gold-accent: #d4af37;  /* Warna emas (opsional untuk kesan luxury) */
            --bg-dark: #020617;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Latar Belakang Digital Globe */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at center, rgba(0, 163, 255, 0.15) 0%, transparent 70%),
                url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) contrast(1.2);
            z-index: -1;
            animation: slowZoom 20s infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .main-card {
            text-align: center;
            padding: 60px;
            width: 100%;
            max-width: 900px;
            z-index: 1;
        }

        /* Gaya Logo Premium */
        .brand-logo {
            font-family: 'Cinzel', serif;
            font-size: 72px;
            font-weight: 400;
            letter-spacing: 25px;
            margin-bottom: 50px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-left: 25px; /* Offset for letter-spacing */
            opacity: 0;
            animation: fadeInDown 1.5s forwards;
        }

        /* Container Waktu */
        .time-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeInUp 1.5s 0.5s forwards;
        }

        .time-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 50px;
            border-radius: 4px; /* Sudut tegas lebih terasa mewah */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        .time-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-5px);
            box-shadow: 0 25px 60px rgba(0, 212, 255, 0.15);
        }

        /* Label Mulai/Selesai */
        .label {
            font-size: 12px;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Angka Jam */
        .time-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            color: #fff;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Teks Deskripsi di Bawah */
        .description {
            max-width: 650px;
            margin: 0 auto;
            font-size: 13px;
            line-height: 2.2;
            letter-spacing: 2.5px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 2s 1.2s forwards;
        }

        /* Garis Dekorasi */
        .divider {
            width: 50px;
            height: 1px;
            background: var(--accent-color);
            margin: 30px auto;
            opacity: 0.5;
        }

        /* Animasi */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Efek khusus pada HP */
        @media (max-width: 768px) {
            .brand-logo { font-size: 40px; letter-spacing: 12px; }
            .time-container { flex-direction: column; gap: 20px; align-items: center; }
            .time-card { width: 280px; padding: 20px; }
            .description { font-size: 11px; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <div class="main-card">
        <!-- Logo Brand -->
        <h1 class="brand-logo">GUCCI</h1>

        <!-- Timer Section -->
        <div class="time-container">
            <div class="time-card">
                <div class="label">Mulai</div>
                <div class="time-value" id="startTime">09:36</div>
            </div>

            <div class="time-card">
                <div class="label">Selesai</div>
                <div class="time-value" id="endTime">09:41</div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Teks Deskripsi -->
        <p class="description">
            Sistem Pemrosesan Otomatis Sedang Berjalan.<br>
            Tetap Aktif Dalam Akun Anda Untuk Sinkronisasi Waktu Nyata.
        </p>
    </div>

    <script>
        // Logika agar waktu terlihat dinamis (opsional)
        function setTimes() {
            const now = new Date();
            
            // Format 00:00
            const format = (date) => date.getHours().toString().padStart(2, '0') + ":" + 
                                     date.getMinutes().toString().padStart(2, '0');

            // Misal: Mulai 5 menit lalu, selesai 10 menit lagi
            const start = new Date(now.getTime() - (5 * 60000));
            const end = new Date(now.getTime() + (10 * 60000));

            // Jika ingin angka tetap seperti gambar, hapus fungsi ini
            // document.getElementById('startTime').innerText = format(start);
            // document.getElementById('endTime').innerText = format(end);
        }

        setTimes();
    </script>
</body>
</html>
