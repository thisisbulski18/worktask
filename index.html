<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis</title>
    <style>
        /* Mengatur dasar halaman */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #000b1a; /* Warna gelap dasar */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Background dengan gambar teknologi/globe */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?ixlib=rb-1.2.1&auto=format&fit=crop&w=1352&q=80') no-repeat center center;
            background-size: cover;
            opacity: 0.3; /* Membuat gambar redup agar teks terbaca */
            z-index: -1;
        }

        /* Overlay gradasi biru gelap */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,20,50,0.5) 0%, rgba(0,5,15,1) 100%);
            z-index: -1;
        }

        /* Kontainer Utama */
        .main-container {
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        /* Logo GUCCI */
        .logo {
            font-family: 'Times New Roman', serif;
            font-size: 80px;
            letter-spacing: 15px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* Kotak Waktu */
        .time-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.1); /* Transparan putih */
            backdrop-filter: blur(5px); /* Efek kaca blur */
            padding: 20px 40px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 150px;
        }

        .time-label {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .time-value {
            font-size: 32px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Teks Keterangan di Bawah */
        .footer-text {
            font-size: 14px;
            line-height: 1.6;
            letter-spacing: 1px;
            max-width: 600px;
            margin: 0 auto;
            color: #d1d5db;
            text-transform: uppercase;
        }

        /* Responsif untuk HP */
        @media (max-width: 600px) {
            .logo { font-size: 40px; letter-spacing: 8px; }
            .time-wrapper { flex-direction: column; align-items: center; }
            .time-box { width: 80%; }
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>
    <div class="gradient-overlay"></div>

    <div class="main-container">
        <!-- Logo -->
        <div class="logo">GUCCI</div>

        <!-- Timer -->
        <div class="time-wrapper">
            <div class="time-box">
                <span class="time-label">MULAI</span>
                <div class="time-value" id="startTime">09:36</div>
            </div>
            <div class="time-box">
                <span class="time-label">SELESAI</span>
                <div class="time-value" id="endTime">09:41</div>
            </div>
        </div>

        <!-- Deskripsi -->
        <p class="footer-text">
            Smart Sistem sedang melakukan pekerjaan secara otomatis  <br>
            Mohon menunggu Hingga waktu yang di tentukan sistem <br>
            Berakhir
        </p>
    </div>

    <script>
        // Opsional: Jika ingin waktu berubah otomatis mengikuti jam sekarang
        function updateTime() {
            const now = new Date();
            
            // Format jam:menit
            function formatTime(date) {
                return date.getHours().toString().padStart(2, '0') + ":" + 
                       date.getMinutes().toString().padStart(2, '0');
            }

            // Contoh: Waktu mulai adalah sekarang, waktu selesai adalah 5 menit lagi
            const startTime = new Date(now.getTime() - (2 * 60000)); // 2 menit lalu
            const endTime = new Date(now.getTime() + (3 * 60000));   // 3 menit lagi

            document.getElementById('startTime').innerText = formatTime(startTime);
            document.getElementById('endTime').innerText = formatTime(endTime);
        }

        // Jalankan fungsi jika ingin waktu dinamis, 
        // atau hapus baris di bawah jika ingin angka tetap seperti di gambar.
        // updateTime(); 
    </script>
</body>
</html>
