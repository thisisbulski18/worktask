<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis | Transparan</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Latar belakang gambar gelap */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: brightness(0.2); /* Sangat gelap agar transparan terlihat */
            z-index: -1;
        }

        .main-wrapper {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        /* Logo GUCCI */
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(60px, 12vw, 120px);
            font-weight: 700;
            letter-spacing: 10px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .time-box-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        /* BAGIAN TRANSPARAN (GLASSMORPHISM) */
        .time-box {
            /* Latar belakang transparan putih tipis */
            background: rgba(255, 255, 255, 0.05); 
            /* Efek blur di belakang kotak */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            padding: 30px 40px;
            border-radius: 15px;
            min-width: 180px;
            /* Border tipis agar bentuk kotak terlihat di kegelapan */
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .label {
            display: block;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 3px;
            margin-bottom: 15px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .time-value {
            font-family: 'Playfair Display', serif;
            font-size: 45px;
            font-weight: 700;
            display: block;
            color: #fff;
        }

        /* Teks Deskripsi Profit */
        .footer-text {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.8;
            letter-spacing: 1px;
            text-transform: uppercase;
            max-width: 600px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 600px) {
            .time-box-container { flex-direction: column; align-items: center; gap: 15px; }
            .time-box { width: 85%; padding: 20px; }
            .logo { font-size: 60px; }
            .footer-text { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <div class="main-wrapper">
        <h1 class="logo">GUCCI</h1>

        <div class="time-box-container">
            <div class="time-box">
                <span class="label">MULAI</span>
                <span class="time-value" id="startTime">--:--</span>
            </div>
            <div class="time-box">
                <span class="label">SELESAI</span>
                <span class="time-value" id="endTime">--:--</span>
            </div>
        </div>

        <p class="footer-text">
            SISTEM SEDANG MEMPROSES PROFIT DI DALAM AKUN ANDA<br>
            MOHON MENUNGGU HINGGA WAKTU YANG<br>
            DITENTUKAN SISTEM BERAKHIR
        </p>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const pad = (num) => num.toString().padStart(2, '0');

            // Set waktu MULAI sesuai jam sekarang (Sync Dunia)
            document.getElementById('startTime').innerText = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

            // Set waktu SELESAI (5 menit setelah mulai seperti gambar)
            const future = new Date(now.getTime() + 5 * 60000);
            document.getElementById('endTime').innerText = `${pad(future.getHours())}:${pad(future.getMinutes())}`;
        }

        // Update tiap detik agar sinkron terus
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
