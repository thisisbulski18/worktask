<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis | Luxury Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --burgundy-dark: #2d050a;
            --burgundy-main: #4d0711;
            --white-pure: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, var(--burgundy-main) 0%, var(--burgundy-dark) 100%);
            font-family: 'Inter', sans-serif;
            color: var(--white-pure);
            overflow: hidden;
        }

        .main-wrapper {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 40px;
        }

        /* Container Logo agar ukurannya pas */
        .logo-container {
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
        }

        /* Ukuran Logo Gucci */
        .logo-svg {
            width: 350px; /* Anda bisa ubah ukuran ini */
            height: auto;
            fill: white; /* Memastikan warna logo putih */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .time-box-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 50px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 45px;
            border-radius: 4px;
            min-width: 180px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .label {
            display: block;
            font-weight: 300;
            font-size: 13px;
            letter-spacing: 6px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }

        .time-value {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            display: block;
        }

        .footer-text {
            font-size: 12px;
            font-weight: 300;
            line-height: 2.2;
            letter-spacing: 3px;
            text-transform: uppercase;
            max-width: 600px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.6);
        }

        .divider {
            width: 40px; height: 1px;
            background: rgba(255, 255, 255, 0.3);
            margin: 30px auto;
        }

        @media (max-width: 600px) {
            .logo-svg { width: 220px; }
            .time-box-container { flex-direction: column; align-items: center; }
            .time-box { width: 80%; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="logo-container">
            <!-- SVG Logo Gucci Asli (Putih) -->
            <svg class="logo-svg" viewBox="0 0 134.1 27.2" xmlns="http://www.w3.org/2000/svg">
                <path d="M19.7 13.6c0 5.4-3.5 9.7-9.8 9.7-5.8 0-9.8-4.2-9.8-9.7 0-5.5 4.1-9.8 9.8-9.8 4 0 7.3 2 8.8 5.2l-1.6.8c-1.2-2.7-3.9-4.3-7.2-4.3-4.5 0-7.8 3.5-7.8 8.1s3.3 8.1 7.8 8.1c4.7 0 7.7-3.1 7.9-7.2h-7.9v-1.6h9.8v.9zm24.6-9.3v13.5c0 3.7-2.1 5.8-5.8 5.8-3.7 0-5.8-2.1-5.8-5.8v-13.5h1.7v13.5c0 2.8 1.4 4.1 4.1 4.1s4.1-1.3 4.1-4.1v-13.5h1.7zm24.6 4.3c-1.2-2.7-3.9-4.3-7.2-4.3-4.5 0-7.8 3.5-7.8 8.1s3.3 8.1 7.8 8.1c3.2 0 6-1.6 7.2-4.3l1.6.8c-1.5 3.3-4.8 5.2-8.8 5.2-5.7 0-9.8-4.3-9.8-9.7s4-9.8 9.8-9.8c4 0 7.3 2 8.8 5.2l-1.6.8zm24.6 0c-1.2-2.7-3.9-4.3-7.2-4.3-4.5 0-7.8 3.5-7.8 8.1s3.3 8.1 7.8 8.1c3.2 0 6-1.6 7.2-4.3l1.6.8c-1.5 3.3-4.8 5.2-8.8 5.2-5.7 0-9.8-4.3-9.8-9.7s4-9.8 9.8-9.8c4 0 7.3 2 8.8 5.2l-1.6.8zm24.6-4.3v19.4h-1.7v-19.4h1.7z"/>
            </svg>
        </div>

        <div class="time-box-container">
            <div class="time-box">
                <span class="label">Mulai</span>
                <span class="time-value" id="startTime">--:--</span>
            </div>
            <div class="time-box">
                <span class="label">Selesai</span>
                <span class="time-value" id="endTime">--:--</span>
            </div>
        </div>

        <div class="divider"></div>

        <p class="footer-text">
            Sistem sedang memproses profit di dalam akun anda<br>
            mohon menunggu hingga waktu yang<br>
            ditentukan sistem berakhir
        </p>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const pad = (num) => num.toString().padStart(2, '0');
            document.getElementById('startTime').innerText = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
            const future = new Date(now.getTime() + 5 * 60000);
            document.getElementById('endTime').innerText = `${pad(future.getHours())}:${pad(future.getMinutes())}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
