<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis | Gucci Luxury 5m</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --burgundy-dark: #2d050a;
            --burgundy-main: #4d0711;
            --white-luxury: #ffffff;
        }

        /* Dasar halaman fleksibel untuk mendukung Zoom browser */
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, var(--burgundy-main) 0%, var(--burgundy-dark) 100%);
            font-family: 'Inter', sans-serif;
            color: var(--white-luxury);
            overflow-x: hidden; 
            overflow-y: auto;
        }

        /* Wrapper Utama agar Layout tidak hancur saat Zoom */
        .page-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100%;
        }

        /* Area Konten Tengah (Fluid Padding) */
        .content-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: clamp(1rem, 5vw, 3rem);
        }

        .main-wrapper {
            text-align: center;
            width: 100%;
            max-width: 900px;
            margin: auto;
        }

        /* Logo GUCCI (Responsif Zoom) */
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 10vw, 6.5rem); 
            font-weight: 600;
            letter-spacing: clamp(10px, 3vw, 25px);
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Kompensasi spasi huruf terakhir agar center presisi */
            padding-left: clamp(10px, 3vw, 25px); 
        }

        /* Container Waktu (Bisa menumpuk otomatis jika di-zoom besar) */
        .time-box-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap; 
        }

        /* Kotak Waktu Glassmorphism */
        .time-box {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: clamp(1.5rem, 4vw, 2.5rem);
            border-radius: 2px;
            min-width: 160px;
            flex: 1;
            max-width: 260px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .label {
            display: block;
            font-weight: 700;
            font-size: clamp(0.7rem, 1.5vw, 0.85rem);
            letter-spacing: 4px;
            margin-bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }

        .time-value {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
        }

        .footer-desc {
            font-size: clamp(0.65rem, 1.2vw, 0.85rem);
            font-weight: 700;
            line-height: 2;
            letter-spacing: 2px;
            text-transform: uppercase;
            max-width: 600px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.8);
        }

        .divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 2rem auto;
        }

        /* Footer Branding di bawah */
        footer {
            padding: clamp(2rem, 5vw, 4rem) 1rem;
            background: rgba(0, 0, 0, 0.15);
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(1rem, 4vw, 3rem);
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .double-g {
            width: clamp(30px, 4vw, 45px);
            fill: white;
            opacity: 0.9;
        }

        .sub-brand {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.65rem, 1.2vw, 0.85rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .copyright-text {
            font-size: clamp(0.55rem, 1vw, 0.7rem);
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Penyesuaian khusus untuk Mobile atau Zoom Extreme */
        @media (max-width: 600px) {
            .time-box-container { flex-direction: column; align-items: center; }
            .time-box { width: 90%; max-width: 100%; }
            .logo-text { letter-spacing: 12px; padding-left: 12px; }
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- Area Konten -->
        <div class="content-area">
            <div class="main-wrapper">
                <h1 class="logo-text">GUCCI</h1>

                <div class="time-box-container">
                    <div class="time-box">
                        <span class="label">MULAI</span>
                        <span class="time-value" id="startTime">--:--</span>
                    </div>
                    <div class="time-box">
                        <span class="label">SELESAI</span>
                        <span class="time-value" id="endTime">--:--</span>
                    </div>
                </div>

                <div class="divider"></div>

                <p class="footer-desc">
                    SISTEM SEDANG MEMPROSES PROFIT DI DALAM AKUN ANDA<br>
                    MOHON MENUNGGU HINGGA WAKTU YANG<br>
                    DITENTUKAN SISTEM BERAKHIR
                </p>
            </div>
        </div>

        <!-- Area Footer -->
        <footer>
            <div class="footer-logos">
                <!-- Icon Double G -->
                <svg class="double-g" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <path d="M256 160c-48.4 0-88.7 32.3-101.3 76.2 11.2-12.4 27.2-20.2 45.1-20.2 33.3 0 60.3 27 60.3 60.3s-27 60.3-60.3 60.3c-17.9 0-33.9-7.8-45.1-20.2 12.6 43.9 52.9 76.2 101.3 76.2 58.2 0 105.3-47.1 105.3-105.3S314.2 160 256 160zm-110.3 116.3c0-24.8 20.2-45 45-45s45 20.2 45 45-20.2 45-45 45-45-20.2-45-45z M366.3 276.3c0 58.2-47.1 105.3-105.3 105.3-48.4 0-88.7-32.3-101.3-76.2 11.2 12.4 27.2 20.2 45.1 20.2 33.3 0 60.3-27 60.3-60.3s-27-60.3-60.3-60.3c-17.9 0-33.9 7.8-45.1 20.2 12.6-43.9 52.9-76.2 101.3-76.2 58.2 0 105.3 47.1 105.3 105.3z M211 276.3c0-24.8 20.2-45 45-45s45 20.2 45 45-20.2 45-45 45-45-20.2-45-45z" transform="scale(0.8) translate(60, 60)"/>
                </svg>
                <div class="sub-brand">GUCCI OSTERIA</div>
                <div class="sub-brand">PALAZZO</div>
                <div class="sub-brand">GUCCI</div>
            </div>
            <div class="copyright-text">
                © 2016 - 2026 GUCCIO GUCCI S.P.A. - ALL RIGHT RESERVED. SIAE LICENCE# 2294/1/1936
            </div>
        </footer>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const pad = (num) => num.toString().padStart(2, '0');
            
            // Waktu Mulai = Jam Sekarang
            document.getElementById('startTime').innerText = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
            
            // Waktu Selesai = Jam Sekarang + 5 Menit
            const future = new Date(now.getTime() + 5 * 60000); 
            document.getElementById('endTime').innerText = `${pad(future.getHours())}:${pad(future.getMinutes())}`;
        }

        // Jalankan setiap detik
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
