<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis | Gucci Official</title>
    <!-- Google Fonts untuk angka jam -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Latar belakang */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: brightness(0.2);
            z-index: -1;
        }

        .main-wrapper {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        /* LOGO GUCCI ASLI */
        .logo-img {
            width: 100%;
            max-width: 450px; /* Ukuran logo */
            height: auto;
            margin-bottom: 40px;
            /* Memberikan efek sedikit putih mengkilap */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2)) invert(1);
        }

        .time-box-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        /* BAGIAN TRANSPARAN */
        .time-box {
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px 40px;
            border-radius: 12px;
            min-width: 170px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .label {
            display: block;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 3px;
            margin-bottom: 12px;
            color: #fff;
        }

        .time-value {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            display: block;
        }

        .footer-text {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.8;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            max-width: 600px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 600px) {
            .logo-img { max-width: 250px; }
            .time-box-container { flex-direction: column; align-items: center; gap: 15px; }
            .time-box { width: 80%; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <div class="main-wrapper">
        <!-- Menggunakan Logo PNG/SVG Gucci Asli -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Gucci-Logo.svg/1280px-Gucci-Logo.svg.png" 
             alt="Gucci Logo" class="logo-img">

        <div class="time-box-container">
            <div class="time-box">
                <span class="label">MULAI</span>
                <span class="time-value" id="startTime">--:--</span>
            </div>
            <div class="time-box">
                <span class="label">SELESAI</span>
                <span class="time-value" id="endTime">--:--</span>
            </div>
        </div>

        <p class="footer-text">
            SISTEM SEDANG MEMPROSES PROFIT DI DALAM AKUN ANDA<br>
            MOHON MENUNGGU HINGGA WAKTU YANG<br>
            DITENTUKAN SISTEM BERAKHIR
        </p>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const pad = (num) => num.toString().padStart(2, '0');

            // Waktu Mulai (Sekarang)
            document.getElementById('startTime').innerText = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

            // Waktu Selesai (+5 Menit)
            const future = new Date(now.getTime() + 5 * 60000);
            document.getElementById('endTime').innerText = `${pad(future.getHours())}:${pad(future.getMinutes())}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
