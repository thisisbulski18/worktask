<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis | Digital Edition</title>
    <!-- Google Fonts untuk tipografi elegan -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000814; /* Biru gelap pekat */
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Latar Belakang Digital Globe Biru */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Menggunakan gambar globe digital bertema tech */
            background: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: brightness(0.2) contrast(1.5) saturate(1.5);
            z-index: -2;
        }

        /* Efek Gradasi Biru Tengah (Radial Glow) */
        .glow-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 50, 150, 0.4) 0%, transparent 70%);
            z-index: -1;
        }

        .main-wrapper {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 900px;
        }

        /* Gaya Logo GUCCI Sesuai Gambar */
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(50px, 12vw, 120px);
            font-weight: 600;
            letter-spacing: 20px; /* Jarak lebar khas Gucci */
            margin-bottom: 30px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            margin-left: 20px; /* Kompensasi spasi huruf terakhir */
        }

        /* Container Kotak Waktu */
        .time-box-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        /* Kotak Transparan (Menyatu dengan Globe) */
        .time-box {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 15px 40px;
            border-radius: 6px;
            min-width: 140px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .label {
            display: block;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
        }

        .time-value {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            font-weight: 600;
            display: block;
        }

        /* Teks Deskripsi di Bawah */
        .footer-text {
            font-size: 14px;
            font-weight: 800;
            line-height: 1.5;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* Responsif HP */
        @media (max-width: 600px) {
            .logo-text { font-size: 45px; letter-spacing: 10px; }
            .time-box { padding: 10px 20px; min-width: 110px; }
            .label { font-size: 16px; }
            .time-value { font-size: 28px; }
            .footer-text { font-size: 11px; padding: 0 15px; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="glow-overlay"></div>

    <div class="main-wrapper">
        <!-- Logo GUCCI Sesuai Gambar -->
        <h1 class="logo-text">GUCCI</h1>

        <!-- Kotak Waktu -->
        <div class="time-box-container">
            <div class="time-box">
                <span class="label">MULAI</span>
                <span class="time-value" id="startTime">11:26</span>
            </div>
            <div class="time-box">
                <span class="label">SELESAI</span>
                <span class="time-value" id="endTime">11:31</span>
            </div>
        </div>

        <!-- Deskripsi -->
        <p class="footer-text">
            SISTEM SEDANG MEMPROSES PROFIT DI DALAM AKUN ANDA<br>
            MOHON MENUNGGU HINGGA WAKTU YANG<br>
            DITENTUKAN SISTEM BERAKHIR
        </p>
    </div>

    <script>
        // Logika Sinkron Jam Dunia
        function updateClock() {
            const now = new Date();
            const pad = (num) => num.toString().padStart(2, '0');

            // Mulai = Waktu sekarang
            document.getElementById('startTime').innerText = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

            // Selesai = 5 menit kemudian
            const future = new Date(now.getTime() + 5 * 60000);
            document.getElementById('endTime').innerText = `${pad(future.getHours())}:${pad(future.getMinutes())}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
