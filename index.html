<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kerja Otomatis</title>
    <!-- Google Fonts untuk tampilan elegan -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* Dasar hitam */
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Latar belakang globe/teknologi */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: brightness(0.3) contrast(1.2);
            z-index: -1;
        }

        /* Efek bayangan biru di tengah agar menyatu dengan globe */
        .glow-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 40, 80, 0.4) 0%, transparent 70%);
            z-index: -1;
        }

        .main-wrapper {
            text-align: center;
            padding: 20px;
            max-width: 700px;
        }

        /* Logo GUCCI - Serif Tebal Putih */
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 100px;
            font-weight: 700;
            letter-spacing: 12px;
            margin: 0 0 20px 0;
            text-transform: uppercase;
        }

        /* Container Kotak Waktu */
        .time-box-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* Kotak Transparan (Menyatu dengan Background) */
        .time-box {
            background: rgba(255, 255, 255, 0.15); /* Transparansi seperti di gambar */
            backdrop-filter: blur(4px); /* Efek sedikit blur di dalam kotak */
            padding: 15px 40px;
            border-radius: 8px;
            min-width: 140px;
        }

        .label {
            display: block;
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .time-value {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            font-weight: 700;
            display: block;
        }

        /* Teks Deskripsi di Bawah */
        .footer-text {
            font-size: 15px;
            font-weight: 800;
            line-height: 1.4;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            max-width: 550px;
            margin: 0 auto;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Responsif HP */
        @media (max-width: 600px) {
            .logo { font-size: 50px; letter-spacing: 5px; }
            .time-box { padding: 10px 20px; min-width: 110px; }
            .label { font-size: 16px; }
            .time-value { font-size: 28px; }
            .footer-text { font-size: 12px; padding: 0 10px; }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="glow-overlay"></div>

    <div class="main-wrapper">
        <!-- Logo -->
        <h1 class="logo">GUCCI</h1>

        <!-- Kotak Waktu -->
        <div class="time-box-container">
            <div class="time-box">
                <span class="label">MULAI</span>
                <span class="time-value">11:15</span>
            </div>
            <div class="time-box">
                <span class="label">SELESAI</span>
                <span class="time-value">11:20</span>
            </div>
        </div>

        <!-- Deskripsi -->
        <p class="footer-text">
            PROSES DI LAKUKAN SECARA OTOMATIS PENGGUNA HANYA<br>
            PERLU ONLINE DI DALAM AKUN KERJA SESUAI WAKTU YANG<br>
            DITENTUKAN SISTEM
        </p>
    </div>

</body>
</html>
